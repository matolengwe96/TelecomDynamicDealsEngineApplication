  job-service:
    image: node:20-alpine
    container_name: dde-job-service
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @dde/job-service db:generate && pnpm --filter @dde/job-service dev"
    volumes:
