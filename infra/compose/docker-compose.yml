    container_name: dde-channel-deals-service
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @dde/channel-deals-service db:generate && pnpm --filter @dde/channel-deals-service dev"
    volumes:
      - ../../:/workspace
    environment:
      NODE_ENV: development
      PORT: 3008
      CHANNEL_DEALS_DB_URL: postgresql://dde_user:dde_pass@postgres:5432/dde_channel_deals?schema=public
      RABBITMQ_URL: amqp://dde_user:dde_pass@rabbitmq:5672
      INTERNAL_SECRET: ${INTERNAL_SECRET:-internal-dev-secret}
    ports:
