version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dde_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dde_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dde_pass}
      POSTGRES_DB: ${POSTGRES_DB:-dde_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-dde_user}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dde_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: ./apps/api-gateway/Dockerfile
    container_name: dde_api_gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgres://${POSTGRES_USER:-dde_user}:${POSTGRES_PASSWORD:-dde_pass}@postgres:5432/${POSTGRES_DB:-dde_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-in-production}
      PORT: 3001
    ports:
      - '3001:3001'

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: dde_web
    restart: unless-stopped
    depends_on:
      - api-gateway
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  redis_data:
