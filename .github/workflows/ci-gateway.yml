name: CI Gateway

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gateway-build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API Gateway
        run: pnpm --filter @dde/api-gateway build

      - name: Run API Gateway tests
        run: pnpm test:gateway:all
